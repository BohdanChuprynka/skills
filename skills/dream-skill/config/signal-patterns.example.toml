# dream-skill: signal extraction patterns
#
# Used by scripts/preprocess.py to mark high-signal lines in the cleaned
# session transcript. Matching lines get a ★ prefix; non-matching lines are
# kept as-is (unless they hit a noise pattern).
#
# This file is the AUTHORITATIVE SPEC. The current implementation has these
# baked into preprocess.py for speed. To tune patterns:
#   - edit this file (for documentation / future direct-read support), AND
#   - edit preprocess.py (for runtime effect)
#
# Patterns are Python regex unless otherwise noted. `entities` are literal
# strings (case-sensitive substring match).

[high_signal]

# Verbs / phrases indicating life-state change. These are the strongest
# signals: someone announcing they've started, stopped, switched, or
# corrected something about themselves.
verbs = [
  "actually",
  "no longer",
  "switched",
  "now (?:building|working|at|focused)",
  "anymore",
  "moved to",
  "started (?:working|building|using|seeing|dating)",
  "ended",
  "decided",
  "stopped",
  "changed (?:my|to|the)",
  "new (?:role|project|job|gym|partner|friend|mentor)",
  "archived?",
  "correct(?:ion)?",
  "wrong",
  "update memory",
  "forget",
  "i'?m (?:now|not|building|working|seeing|going to)",
  "we'?re (?:now|not|building|working)",
  "current(?:ly)?",
  "my (?:goal|priority|focus)",
  "shipped",
  "launched",
  "deployed",
  "graduated",
  "promoted",
  "transitioned",
  "joining",
  "leaving",
]

# Anchor phrases for personal context. Matches when the user is explicitly
# referencing their own state.
anchors = [
  "my role",
  "my job",
  "my project",
  "my goal",
  "my routine",
  "my schedule",
  "current focus",
  "north star",
  "i prefer",
  "i don'?t want",
  "my approach",
]

# Entity mentions. Substring match (case-sensitive). Customize with YOUR
# entities — companies, projects, key people — as you discover that mentions
# of them correlate with persona-relevant signal.
#
# Examples to get you started (placeholders; replace with your own):
entities = [
  # "Acme Corp",         # current employer
  # "Project Phoenix",   # active project
  # "John Doe",          # key contact / mentor / manager
  # "Example Gym",       # fitness routine reference
]

[noise]

# Skip prefixes: messages starting with these strings are dropped entirely
# (they're system noise, not user signal).
skip_prefixes = [
  "<system-reminder",
  "<command-name",
  "<command-message",
  "<command-args",
  "<local-command-stdout",
  "<local-command-stderr",
  "<bash-stdout",
  "<bash-stderr",
  "<user-prompt-submit-hook",
  "Caveat: The messages below",
]

# Additional regex patterns to suppress lines that match. These are LLM
# assistant boilerplate openers that add no signal.
patterns = [
  "^I'll ",
  "^Sure[!,.] ",
  "^Let me ",
  "^Here'?s ",
  "^```",
]

[filter]

# User replies shorter than this (chars) are treated as Q/A anchors. The
# preceding assistant message is also kept so the short reply has context.
short_reply_chars = 60

# Truncate user messages longer than this. Caps absolute token cost on
# Stage 3 even if someone pastes a huge code block.
user_msg_max = 1500

# Truncate assistant messages longer than this (when kept as Q/A anchors).
asst_msg_max = 1000
