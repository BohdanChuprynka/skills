# calendar-plan settings (claude target)
#
# Copy to config/settings.conf and edit. The real file is gitignored.
# Resolution order for any of these:  CLI flag > env var > this file > built-in default

# Anthropic model used for the run. See `claude --help` for available IDs.
# Recommended: claude-sonnet-4-6 (cheaper, fast enough). Use claude-opus-4-7 for
# unusually complex scheduling weeks (multiple exams + travel + meetings).
MODEL="claude-sonnet-4-6"

# IANA timezone — used for target-date resolution and for the launchd plist.
TIMEZONE="America/New_York"

# Hour the daily cron fires (24h, local TIMEZONE). 22 = 10:00 PM.
CRON_HOUR="22"

# Absolute path to the Obsidian Calendar Context markdown page. Read each run.
CALENDAR_CONTEXT="<REPLACE_WITH_ABSOLUTE_PATH_TO_CALENDAR_CONTEXT_MD>"

# Title of the Notion private page that holds your daily task sequence.
TASK_SOURCE_NAME="<Your Planner Page Title>"

# Mode for the scheduled run. "auto" applies safe blocks directly; "draft" only emits a plan.
DEFAULT_MODE="auto"

# Optional: extra --add-dir paths (space-separated, absolute). Useful when the
# planner needs to read other vault pages (e.g. project deadlines, gym plan).
EXTRA_ADD_DIRS=""
