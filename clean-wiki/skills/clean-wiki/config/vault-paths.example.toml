# clean-wiki: vault paths config — EXAMPLE
# Copy to vault-paths.toml and adapt to your vault layout.
# Real vault-paths.toml is .gitignored.

# ============================================================
# Vaults to scan
# ============================================================
# Each [[vaults]] block declares one Obsidian vault.
# Required: name, path
# Optional: wiki_subdir (default "wiki"), index_file, archive_dir, required_frontmatter

[[vaults]]
name = "me"
path = "/ABSOLUTE/PATH/TO/Obsidian/me"
wiki_subdir = "wiki"
index_file = "wiki/index.md"
archive_dir = "wiki/_archive"
required_frontmatter = ["tags", "created", "updated"]

[[vaults]]
name = "projects"
path = "/ABSOLUTE/PATH/TO/Obsidian/projects"
wiki_subdir = "wiki"
index_file = "wiki/index.md"
archive_dir = "wiki/_archive"
required_frontmatter = ["tags", "created", "updated"]

# Add more [[vaults]] blocks as needed. Comment out vaults you don't want scanned.

# Optional. If omitted, reports default to `clean-reports/` beside the configured
# vault roots, e.g. `/ABSOLUTE/PATH/TO/Obsidian/clean-reports`.
# reports_dir = "/ABSOLUTE/PATH/TO/Obsidian/clean-reports"

