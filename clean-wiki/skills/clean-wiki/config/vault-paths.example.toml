# ============================================================
# Scan tuning
# ============================================================

[scan]
# Active pages with updated: > stale_active_days are flagged for confirmation
stale_active_days = 180

# Paths (glob) excluded from scan entirely
ignore_globs = [
    ".obsidian/**",
    "**/_archive/**",
    "**/raw/**",
    "**/raw/completed/**",
    "**/.trash/**",
]

# Statuses that exempt pages from "stale active" checks
non_active_statuses = ["completed", "superseded", "archived", "paused"]


# ============================================================
# Web UI
# ============================================================

[ui]
port = 5173
auto_open_browser = true
# Confidence levels to show by default. "low" hidden unless --aggressive flag passed.
default_confidence_filter = ["high", "medium"]
# How many context characters to include in each card
context_snippet_chars = 400


# ============================================================
# Apply behavior
# ============================================================

[apply]
# Where to move archived files (per-vault archive_dir overrides this)
default_archive_pattern = "_archive/{date}/{original_path}"
# Confirm with extra prompt for actions on files older than this many days
extra_confirm_age_days = 365
