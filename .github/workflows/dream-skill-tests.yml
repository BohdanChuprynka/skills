name: dream-skill tests

on:
  push:
    paths:
      - 'dream-skill/**'
      - '.github/workflows/dream-skill-tests.yml'
  pull_request:
    paths:
      - 'dream-skill/**'
      - '.github/workflows/dream-skill-tests.yml'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          command -v rg >/dev/null || brew install ripgrep
          jq --version
          rg --version
          shasum --version

      - name: Make scripts executable
        run: |
          chmod +x dream-skill/scripts/*.sh
          chmod +x dream-skill/tests/run.sh dream-skill/tests/run-all.sh
          chmod +x dream-skill/tests/test_*.sh

      - name: Validate plugin manifests
        run: |
          jq . dream-skill/.claude-plugin/plugin.json
          jq . dream-skill/.claude-plugin/marketplace.json
          jq . dream-skill/hooks/hooks.json
          jq . .claude-plugin/marketplace.json

      - name: Run shipped test suite
        working-directory: dream-skill
        run: tests/run.sh
